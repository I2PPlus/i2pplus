# docker-compose.yml

# Service definition for I2P+ router
services:
  i2p:
    # Build the service from the Dockerfile in the docker/ directory
    build:
      context: ..
      dockerfile: docker/Dockerfile

    # Run the container in host network mode for direct access to host network
    network_mode: host

    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535

    restart: unless-stopped

    # Allow sufficient time for the router's shutdown hook to complete:
    # shutdown tasks may wait up to 60s, plus subsystem shutdown and
    # finalShutdown. Without this, Docker's default 10s SIGKILL kills the
    # JVM before router.ping is deleted, causing the new instance to stall
    # for 60+ seconds waiting for the stale ping file to age out.
    stop_grace_period: 90s

    # Mount volumes for persistent data storage
    volumes:
      # Config directory for I2P router
      - ${I2P_CONFIG_DIR:-./docker/run/home/config}:/i2p/.i2p
      # Torrents directory for I2PSnark
      - ${TORRENTS_DIR:-./docker/run/torrents}:/i2psnark
