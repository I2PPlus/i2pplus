packetQueuing = Filas de Pacotes
packetQueuingInfo = TCP (Protocolo de Controle de Transmissão) transfere dados de forma confiável entre dois\n hosts. Ele automaticamente detecta e recupera de erros\ n e perdas. O TCP usa buffers para prover essa confiabilidade. Além disso, switches e roteadores usam buffers para lidar/gerenciar casos em que vários links enviam pacotes para uma única saída ou a velocuidade do link muda\n (Ethernet Rápida para modem DSL.\n\n O servidor NDT gera e envia 10 segundos de dados para o cliente. Em\n alguns casos o servidor pode gerar dados mais rápido do que enviar pacotes para a rede (ex: um CPU de 2GHz enviando para um cliente conectado a um DSL).\n Quando isso ocorre, alguns pacotes podem ficar enfileiirados na saída do servidor\n quando é expirado o tempo de 10 segundos. O TCP automaticamente continuará a enviar esses pacotes enfileirados e o cliente vai continuar aceitando e processando esses pacotes. Isso resulta em um maior tempo de execução do teste do cliente. Essa situação ocorreu durante esse teste. Nenhuma ação é requerida para\n resolver esse problema.
