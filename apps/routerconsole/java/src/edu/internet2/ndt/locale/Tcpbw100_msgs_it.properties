packetQueuing = Coda di pacchetti
packetQueuingInfo = TCP (Transmission Control Protocol) trasferisce dati in modo affidabile tra due host Internet. Rileva e riprende automaticamente da errori e perdite. TCP usa buffer per fornire questa affidabilità. Inoltre, switch e router usano buffer per gestire i casi in cui più collegamenti inviano pacchetti a un singolo collegamento in uscita o le velocità cambiano.\n\nIl server NDT genera e invia 10 secondi di dati al client. In alcuni casi il server può generare dati più velocemente di quanto possa inviarli alla rete. Quando ciò accade, alcuni pacchetti possono rimanere nella coda di uscita del server quando scade il timer di 10 secondi. TCP continuerà automaticamente a inviare questi pacchetti in coda e il client continuerà ad accettare e processare questi pacchetti in entrata. Questo farà durare il test del client più del previsto.\n\nQuesta condizione si è verificata durante questo test. Nessuna azione è necessaria.
