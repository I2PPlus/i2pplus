হোস্টের মধ্যে ডেটা স্থানান্তর করে। এটি স্বয়ংক্রিয়ভাবে ত্রুটি এবং
লস সনাক্ত ও পুনরুদ্ধার করে। TCP নির্ভরযোগ্যতার জন্য বাফার ব্যবহার করে।
উপরন্তু, সুইচ এবং রাউটার একাধিক ইনপুট লিংক থেকে একটি আউটপুট লিংকে
প্যাকেট পাঠানোর সময় বাফার ব্যবহার করে।

NDT সার্ভার ১০ সেকেন্ডের ডেটা তৈরি করে এবং ক্লায়েন্টে পাঠায়।
কিছু ক্ষেত্রে সার্ভার নেটওয়ার্কে প্যাকেট পাঠানোর চেয়ে দ্রুত ডেটা তৈরি করতে পারে
(যেমন, DSL ক্লায়েন্টে 2 GHz CPU থেকে পাঠানো)।
এমন হলে, ১০ সেকেন্ডের টাইমার শেষ হলে কিছু প্যাকেট
সার্ভার আউটপুট সারিতে থেকে যেতে পারে। TCP স্বয়ংক্রিয়ভাবে এই
সারিবদ্ধ প্যাকেটগুলো পাঠাতে থাকবে এবং ক্লায়েন্ট গ্রহণ ও
প্রক্রিয়াকরণ চালিয়ে যাবে। এর ফলে ক্লায়েন্ট পরীক্ষা
আশানুরূপের চেয়ে বেশি সময় নিতে পারে।

এই পরীক্ষায় এই অবস্থা ঘটেছে। এই সমস্যা সমাধানের জন্য কোনো
পদক্ষেপের প্রয়োজন নেই।
