packetQueuingInfo = TCP (Transmission Control Protocol) надежно передает данные между двумя\n хостами в Интернете. Он автоматически обнаруживает и восстанавливается после ошибок и\n потерь. TCP использует буферизацию чтобы обеспечить эту надежность. Кроме того,\n в сетевых коммутаторах и маршрутизаторах используется буферизация в случаях, когда несколько входящих соединений \n  отправляют пакеты в одно исходящее или когда скорость соединения изменяется \n (например с FastEthernet до  DSL модема).\n\n NDT сервер посылает каждые 10 секунд данные клиенту.\n В некоторых случаях сервер может генерировать посылаемые данные быстрее, чем  может посылать пакеты\n в сеть (например в случае сервера с процессором 2 ГГц отправляющего данные на клиента через DSL).\n Когда это случается, некоторые пакеты могут оставаться на  выходной  очередььи сервера\n даже когда 10-ти секундный таймер истечет. TCP автоматически продолжит\n отправлять эти пакеты из очереди, и клиент будет продолжать принимать и\n обработать эти входящие пакеты. Это приведет к\n тому что тест может затянуться.\n\n Это случилось во время этого теста. Никаких действий предпринимать не требуется, чтобы\n решить эту проблему.
