packetQueuing = Τα πακέτα μπαίνουν σε ουρά
packetQueuingInfo = Το TCP (Transmission Control Protocol) μεταφέρει δεδομένα με αξιόπιστο τρόπο ανάμεσα σε δύο υπολογιστές. Το TCP καταλαβαίνει και διορθώνει αυτόματα λάθη και απώλειες. Το TCP χρησιμοποιεί buffers για να πετύχει αυτή την αξιοπιστία.  Επιπρόσθετα, οι δρομολογητές και οι μεταγωγείς χρησιμοποιούν buffers για περιπτώσεις όπου πολλαπλές συνδέσεις εισόδου στέλνουν πακέτα σε μια σύνδεση εξόδου ή όπου η ταχύτητα των συνδέσεων αλλάζει (π.χ. FastEthernet σε DSL modem).\n\n Ο εξυπηρετητής NDT παράγει και στέλνει δεδομένα στο πελάτη για 10 δευτερόλεπτα.  Σε κάποιες περιπτώσεις ο εξυπηρετητής μπορεί να παράγει δεδομένα πιο γρήγορα από τον ρυθμό με τον οποίο μπορεί να στείλει τα πακέτα στο δίκτυο (π.χ., ένας επεξεργαστής των 2 GHz να στέλνει σε έναν πελάτη DSL).\n Όταν συμβαίνει αυτό, κάποια πακέτα μπορεί να μείνουν στην ουρά εξόδου του εξυπηρετητή όταν τα 10 δευτερόλεπτα τελειώσουν. Το TCP θα συνεχίσει αυτόματα να στέλνει αυτά τα πακέτα της ουράς και ο πελάτης θα συνεχίσει να τα λαμβάνει και να τα επεξεργάζεται, με αποτέλεσμα η μέτρηση να κάνει περισσότερο από όσο ανεμένετο.\n\n  Κάτι τέτοιο συνέβη κατά την διάρκεια αυτής της δοκιμής.  Δεν χρειάζεται κάποια διόρθωση για αυτό το φαινόμενο.
