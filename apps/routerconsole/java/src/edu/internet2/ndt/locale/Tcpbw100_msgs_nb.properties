packetQueuing = Pakkekøing
packetQueuingInfo = TCP (Transmission Control Protocol) er en pålitelig nettverksprotokoll\n som overfører data mellom forskjellige maskiner. Den oppdager og motvirker\n automatisk feil og pakketap. TCP bruker buffere for å oppnå dette.\n I tillegg så har svitsjer og rutere buffere for å håndtere tilfeller\n hvor mange maskiner sender til samme port, eller hvor hastigheter\n endres (for eksempel "Fast Ethernet" eller et DSL-modem).\n \n NDT-tjeneren genererer og sender 10 sekunder med data til klienten.\n I noen tilfeller genererer tjeneren data kjappere enn den klarer å\n sende ut pakker til nettverket (for eksempel en tjener med 2GHz CPU\n som sender til en klient koblet til via DSL). Når dette skjer, hender\n det at det er igjen pakker i pakkekøen når de 10 sekundene har passert.\n TCP vil automatisk forsøke å sende disse pakkene, selv om tiden er ute,\n og klienten vil fortsette å motta de. Dette vil føre til at klienttesten\n kan kjøre litt lenger enn forventet.\n \n Dette hendte under kjøringen av denne testen. Du trenger ikke gjøre noe\n for å fikse dette.
