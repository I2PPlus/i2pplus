packetQueuing = Cola de paquetes
packetQueuingInfo = TCP (Protocolo de Control de Transmisión) transfiere datos de manera confiable entre dos hosts de Internet. Detecta y recupera automáticamente errores y pérdidas. TCP usa búferes para proporcionar esta confiabilidad. Además, los conmutadores y enrutadores usan búferes para manejar casos donde múltiples enlaces de entrada envían paquetes a un solo enlace de salida o donde las velocidades de enlace cambian.\n\nEl servidor NDT genera y envía 10 segundos de datos al cliente. En algunos casos, el servidor puede generar datos más rápido de lo que puede enviar paquetes a la red. Cuando esto sucede, algunos paquetes pueden permanecer en la cola de salida del servidor cuando expira el temporizador de 10 segundos. TCP automáticamente continuará enviando estos paquetes en cola y el cliente continuará aceptando y procesando estos paquetes entrantes. Esto hará que la prueba del cliente dure más de lo esperado.\n\nEsta condición ha ocurrido durante esta prueba. No se requiere ninguna acción.
