packetQueuing = Posant paquets en cua
packetQueuingInfo = TCP (Transmission Control Protocol)  transfereix dades entre dos\n equips d'internet. Automàticament detecta i es recupera d'errors i pèrdues./n TCP utilitza buffers per a proporcionar aquesta confiabilitat.  Ademés,\n els switch i routers
utilitzen buffers per aquells casos en que múltiples enllaços d'entrada\n envien paquets a un únic enllaç de sortida o si varien les velocitats de cada enllaç\n (FastEthernet a modem DSL).\n\n El servidor NDT genera i envia 10 segons de dades al client. En\n alguns casos el servidor pot generar les dades més de pressa del que pot enviar els paquets a la xarxa\n (p.ex., una CPU a 2 GHz enviant a un client conectat a una DSL).\n Quan passa això, alguns paquets es poden quedar a la cua de sortida /n quan s'acaba el temporitzador de 10 segons.\n El TCP continuarà enviant automaticament aquests missatges a la cua i el client continuarà acceptant-los i processant-los.\n Això provoca que una prova duri més del que s'espera.\n\n Aquesta condició s'ha produït durant aquesta prova. /n No es requereix cap acció per a resoldre aquesta situació.
