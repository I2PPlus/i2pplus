packetQueuing = Paketwarteschlange
packetQueuingInfo = TCP (Transmission Control Protocol) überträgt Daten zuverlässig zwischen zwei Internet-Hosts. Es erkennt und behebt automatisch Fehler und Verluste. TCP verwendet Puffer um diese Zuverlässigkeit bereitzustellen. Darüber hinaus verwenden Switches und Router Puffer um Fälle zu behandeln in denen mehrere Eingabelinks Pakete an einen einzelnen Ausgabelink senden oder sich die Linkgeschwindigkeiten ändern.\n\nDer NDT-Server erzeugt und sendet 10 Sekunden Daten an den Client. In einigen Fällen kann der Server Daten schneller erzeugen als er sie in das Netzwerk senden kann. Wenn dies geschieht können einige Pakete in der Ausgabeschlange des Servers verbleiben wenn der 10-Sekunden-Timer abläuft. TCP wird diese Pakete automatisch weiter senden und der Client wird diese eingehenden Pakete weiterhin annehmen und verarbeiten. Dies führt dazu dass der Client-Test länger dauert als erwartet.\n\nDieser Zustand ist während dieses Tests aufgetreten. Es ist keine Aktion erforderlich.
