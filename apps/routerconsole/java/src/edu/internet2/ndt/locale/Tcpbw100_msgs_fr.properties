packetQueuing = Mise en file d'attente de paquets
packetQueuingInfo = TCP (Transmission Control Protocol) transfère de manière fiable les données entre deux hôtes Internet. Il détecte et récupère automatiquement des erreurs et des pertes. TCP utilise des tampons pour fournir cette fiabilité. De plus, les commutateurs et routeurs utilisent des tampons pour gérer les cas où plusieurs liaisons d'entrée envoient des paquets vers une seule liaison de sortie ou où les vitesses de liaison changent.\n\nLe serveur NDT génère et envoie 10 secondes de données au client. Dans certains cas, le serveur peut générer des données plus rapidement qu'il ne peut les envoyer dans le réseau. Quand cela se produit, certains paquets peuvent rester dans la file d'attente de sortie du serveur lorsque le timer de 10 secondes expire. TCP enverra automatiquement ces paquets en file d'attente et le client continuera à accepter et traiter ces paquets entrants. Cela entraînera un test client plus long que prévu.\n\nCette condition s'est produite pendant ce test. Aucune action n'est requise.
