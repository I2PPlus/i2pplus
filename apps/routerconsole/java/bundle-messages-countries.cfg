CLASS=net.i2p.router.countries.messages
PO_GLOB=../locale-countries/messages_*.po
JPATHS=$BD/Countries.java
XGETTEXT_KEYWORDS="--keyword=_t"
PACKAGE_PATH=net/i2p/router/countries
CLASS_OUTPUT_DIR=$BD/obj
SUFFIX=countries
XGETTEXT_SKIP_DEFAULTS=true
XGETTEXT_EXTRA_FLAGS="--no-location"
TMPFILE=$BD/javafiles-countries.txt
PRE_COMMAND='CFILE=../../../installer/resources/geoip/countries.txt; JFILE=$BD/Countries.java; if [ "$CFILE" -nt "$JFILE" -o ! -s "$JFILE" ]; then mkdir -p "$BD"; echo "// Automatically generated pseudo-java for xgettext - do not edit" > "$JFILE"; echo "// Translators may wish to translate a few of these, do not bother to translate all of them!!" >> "$JFILE"; sed -e "/^#/d" -e "s/..,\(..*\)/_t(\"\1\");/" "$CFILE" >> "$JFILE"; fi'
