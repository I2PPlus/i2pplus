sourceSets {
    main {
        java {
            srcDir 'java/src'
            srcDir "$buildDir/messages-src"
        }
    }
    test {
        java {
            srcDir 'java/test'
        }
        resources {
            srcDir 'java/test/junit'
        }
    }
}

dependencies {
    implementation project(':core')
    implementation project(':apps:jetty')
    implementation project(':apps:ministreaming')
    implementation project(':router')
    testImplementation 'junit:junit:4.13.2'
}

// Create the java files from the po files. The jar task will compile them.
// This requires gettext 0.19 or higher.
// We don't support the "slow way"
def buildDirPath = buildDir
task bundle {
    doLast {
        if (!(new File("${buildDirPath}/classes/java/main/net/i2p/addressbook/messages_de.class")).exists())
            println "apps/addressbook/java/bundle-messages.sh ${buildDirPath}".execute().text
    }
}

jar.dependsOn bundle
