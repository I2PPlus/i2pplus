name: Java CI

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: PackageInstall
        run: sudo apt install -y gettext ant-contrib parallel uglifyjs

      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Create tmpfs for build output
        run: |
          sudo mkdir -p /tmp/build-i2p
          sudo mount -t tmpfs -o size=2G tmpfs /tmp/build-i2p

      - name: Install quiet logger (buildtools + jar to ~/.ant/lib)
        run: ant install-buildtools

      - name: Enable quiet logger for subsequent builds
        run: cp tools/ant/.antrc ~/.antrc

      - name: Build i2pupdate.zip with Ant
        run: ant distclean updaterCompact

      - name: Build installer with Ant
        run: ant pkg

      - name: Build Debian package with Ant
        run: ant buildDeb

      - name: Build I2PSnark standalone with Ant
        run: ant i2psnark

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: i2p-build-artifacts
          path: |
            dist/i2pupdate.zip
            dist/install.jar
            dist/i2psnark-standalone.zip
            dist/*.deb
          retention-days: 7
