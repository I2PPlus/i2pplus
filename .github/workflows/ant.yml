name: Java CI

on:
  push:
    branches:
      - master
      - dev
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: PackageInstall
        run: sudo apt install -y gettext ant-contrib parallel uglifyjs

      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Create tmpfs for build output
        run: |
          sudo mkdir -p /tmp/build-i2p
          sudo mount -t tmpfs -o size=2G tmpfs /tmp/build-i2p

      - name: Install quiet logger (buildtools + jar to ~/.ant/lib)
        run: ant install-buildtools

      - name: Enable quiet logger for subsequent builds
        run: cp tools/ant/.antrc ~/.antrc

      - name: Build all artifacts
        run: ant updaterWithGeoIP installer i2psnark buildDeb

      - name: Build javadoc
        continue-on-error: true
        run: ant javadoc-zip-ci

      - name: Build jsdoc
        continue-on-error: true
        run: ant jsdoc-zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: i2p-build-artifacts
          path: |
            dist/i2pupdate.zip
            dist/install.jar
            dist/i2pinstall.exe
            dist/i2psnark-standalone.zip
            dist/javadoc.zip
            dist/jsdoc.zip
            dist/*.deb
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/i2pupdate.zip
            dist/install.jar
            dist/i2pinstall.exe
            dist/i2psnark-standalone.zip
            dist/javadoc.zip
            dist/jsdoc.zip
            dist/*.deb
          generate_release_notes: true

  continuous:
    if: github.ref_name == 'master' || github.ref_name == 'dev'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: i2p-build-artifacts
          path: artifacts/

      - name: Upload continuous release
        uses: ncipollo/release-action@v1
        with:
          tag: continuous
          name: Continuous Build
          body: "Automated build from ${{ github.sha }}"
          commit: ${{ github.sha }}
          artifacts: artifacts/*
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          omitBodyDuringUpdate: true
          skipIfReleaseExists: false
          token: ${{ secrets.GITHUB_TOKEN }}
