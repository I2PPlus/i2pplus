default:
  artifacts:
    name: "$CI_PROJECT_NAME Bundle $CI_COMMIT_SHORT_SHA $CI_JOB_NAME"
    paths:
      - i2pinstall.exe
      - i2pupdate.zip
      - i2pupdate200.zip
      - install.jar
      - i2psnark-standalone.zip
      - javadoc.zip
      - i2p.tar.bz2
      - i2pplus_latest_source.tar.gz
    expire_in: 8 weeks

stages:
  - build
#  - test

before_script:
  # install dependencies to build EXEs and packages
  - apt-get update -yqq
  - apt-get install -yqq libc6-i386 ant gettext zip git
  - java -version

Graal21:
  stage: build
  only:
    - graal
  image: adoptopenjdk:8-jdk-hotspot
  allow_failure: true
  before_script:
    # install GraalVM and dependencies
    - wget https://github.com/graalvm/graalvm-ce-builds/releases/download/vm-21.0.0.2/graalvm-ce-java8-linux-amd64-21.0.0.2.tar.gz
    - tar -xzf graalvm-ce-java8-linux-amd64-21.0.0.2.tar.gz
    - export GRAALVM_HOME=$PWD/graalvm-ce-java8-21.0.0.2
    - export PATH=$GRAALVM_HOME/bin:$PATH
    - gu install native-image
    - apt-get update -yqq
    - apt-get install -yqq ant gettext zip git
    - java -version
  script:
    # build the required packages
    - ant pkg
    - ant tarball
    - ant updaterCompact
    # identify the main class from the JAR file
    - JAR_FILE=$(ls target/*.jar)
    - MAIN_CLASS=$(jar tf $JAR_FILE | grep -e "^.*Main.class$" | sed 's/\.class//;s#/#.#g')
    # generate the native executable with a prefix
    - PREFIXED_NATIVE_EXE=target/graal-i2p
    - native-image --no-server -cp $JAR_FILE $MAIN_CLASS -H:Name=$PREFIXED_NATIVE_EXE
    # identify the main class from the ZIP file
    - ZIP_FILE=$(ls target/*.zip)
    - MAIN_CLASS=$(unzip -p $ZIP_FILE META-INF/MANIFEST.MF | grep "Main-Class:" | awk '{ print $2 }')
    # generate the native executable with a prefix
    - PREFIXED_NATIVE_EXE=target/graal-i2p
    - native-image --no-server -jar $ZIP_FILE $MAIN_CLASS -H:Name=$PREFIXED_NATIVE_EXE
    # rename the package files with a prefix
    - mv target/i2p* $PREFIXED_NATIVE_EXE.jar
    - mv target/updaterCompact* $PREFIXED_NATIVE_EXE-updaterCompact.jar
    - mv target/updater200Compact* $PREFIXED_NATIVE_EXE-updater200Compact.jar
    - mv target/i2psnark* $PREFIXED_NATIVE_EXE-i2psnark.jar

